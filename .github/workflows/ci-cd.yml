name: Bookstore CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bookstore-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  validate:
    name: Validate Monorepo
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=5s
    env:
      NODE_ENV: test
      MONGO_URI: mongodb://localhost:27017
      JWT_SECRET: ci_test_secret
      SECRET_KEY: ci_test_secret
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/web/package-lock.json
            apps/api-gateway/package-lock.json
            services/identity-service/package-lock.json
            services/catalog-service/package-lock.json
            services/checkout-service/package-lock.json
            services/media-service/package-lock.json
            services/notification-service/package-lock.json
            services/reporting-service/package-lock.json
            services/support-service/package-lock.json
            services/assistant-service/package-lock.json

      - name: Install active stack dependencies
        run: npm run ci:install:active

      - name: Run core service tests
        run: npm run ci:test:core

      - name: Run full service test suite
        run: npm run ci:test:all

      - name: Build frontend
        run: npm run build:web

      - name: Validate Docker Compose
        run: npm run ci:compose:check

  docker-build:
    name: Build Docker Images
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build active stack images
        run: docker compose -f docker-compose.micro.yml build

  deploy:
    name: Deploy To Self-Hosted Runner
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.ENABLE_SELF_HOSTED_DEPLOY == 'true'
    needs: docker-build
    runs-on: self-hosted
    environment:
      name: production
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Deploy active stack
        run: |
          docker compose -f docker-compose.micro.yml down --remove-orphans
          docker compose -f docker-compose.micro.yml up -d --build --remove-orphans
