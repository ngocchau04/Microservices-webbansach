# Legacy monolith compose is intentionally disabled.
# Use: docker compose -f docker-compose.micro.yml up --build

services:
  legacy-compose-disabled:
    image: alpine:3.20
    container_name: legacy-compose-disabled
    command:
      - /bin/sh
      - -c
      - |
        echo "[LEGACY DISABLED] This repository now runs microservices-first.";
        echo "Use: docker compose -f docker-compose.micro.yml up --build";
        exit 1
